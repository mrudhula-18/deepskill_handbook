server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    # This IS the registry, so it does not need to register with itself
    # or fetch a registry from anywhere else.
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation so the demo cluster evicts dead instances
    # quickly instead of waiting out Eureka's renewal-threshold window.
    enable-self-preservation: false

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
