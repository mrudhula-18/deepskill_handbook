# nginx.conf - minimal SPA-friendly server block for the frontend image
#
# Copied into /etc/nginx/conf.d/default.conf by frontend.Dockerfile.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Enable gzip compression for common text-based assets.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Serve static assets directly; fall back to index.html for any route
    # that doesn't match a real file, so client-side routing (React Router
    # etc.) works correctly on full-page reloads and deep links.
    location / {
        try_files $uri /index.html;
    }

    # Cache immutable static assets aggressively.
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
