<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THM Terminal — Round 2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:   #00ff41;
    --dimgreen: #00aa2a;
    --red:     #ff3c3c;
    --cyan:    #00e5ff;
    --yellow:  #ffe94d;
    --pink:    #ff79c6;
    --bg:      #020c02;
    --panel:   #050f05;
    --border:  #0d3b0d;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  /* ── scanline + vignette overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 998; pointer-events: none;
    background: radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.82) 100%);
  }

  /* ── layout ── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 0;
  }

  /* ── title bar ── */
  #titlebar {
    background: #020c02;
    border-bottom: 1px solid var(--border);
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }
  #titlebar .dots span {
    display: inline-block; width: 11px; height: 11px;
    border-radius: 50%; margin-right: 5px;
  }
  .dot-r { background: #ff5f57; }
  .dot-y { background: #febc2e; }
  .dot-g { background: #28c840; }
  #titlebar .title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dimgreen);
    text-transform: uppercase;
    flex: 1; text-align: center;
  }
  #titlebar .status {
    font-size: 11px;
    color: var(--dimgreen);
  }
  #blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── round banner ── */
  #round-banner {
    text-align: center;
    padding: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--yellow);
    border-bottom: 1px solid var(--border);
    background: rgba(255,233,77,0.04);
    flex-shrink: 0;
    text-shadow: 0 0 12px rgba(255,233,77,0.5);
  }

  /* ── objectives bar ── */
  #objectives {
    display: flex;
    gap: 20px;
    padding: 7px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,255,65,0.03);
    flex-shrink: 0;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .obj {
    display: flex; align-items: center; gap: 6px;
    color: #3a6b3a;
    transition: color 0.4s;
  }
  .obj.done { color: var(--green); }
  .obj .check { font-size: 14px; }

  /* ── output area ── */
  #output {
    flex: 1;
    overflow-y: auto;
    padding: 14px 18px 4px;
    line-height: 1.7;
    font-size: 14px;
    scroll-behavior: smooth;
  }
  #output::-webkit-scrollbar { width: 6px; }
  #output::-webkit-scrollbar-track { background: var(--bg); }
  #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .line { display: block; animation: fadein 0.12s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; } }

  .prompt-line { color: var(--green); }
  .c-green  { color: var(--green); }
  .c-cyan   { color: var(--cyan); }
  .c-yellow { color: var(--yellow); }
  .c-red    { color: var(--red); }
  .c-pink   { color: var(--pink); }
  .c-dim    { color: var(--dimgreen); }
  .c-white  { color: #e0e0e0; }
  .c-bold   { font-weight: bold; }

  /* ── input row ── */
  #input-row {
    display: flex;
    align-items: center;
    padding: 10px 18px 14px;
    border-top: 1px solid var(--border);
    gap: 8px;
    flex-shrink: 0;
    background: var(--panel);
  }
  #prompt-label {
    white-space: nowrap;
    font-size: 14px;
    color: var(--green);
    text-shadow: 0 0 8px rgba(0,255,65,0.5);
  }
  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    caret-color: var(--green);
  }
  #cmd-input::placeholder { color: #1a4a1a; }

  /* ── win overlay ── */
  #win-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.88);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    animation: winFade 0.6s ease;
  }
  #win-overlay.show { display: flex; }
  @keyframes winFade { from { opacity: 0; } to { opacity: 1; } }
  #win-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 5vw, 52px);
    color: var(--green);
    text-shadow: 0 0 30px var(--green), 0 0 60px var(--green);
    text-align: center;
    animation: pulse 1.5s ease-in-out infinite;
    letter-spacing: 4px;
  }
  @keyframes pulse {
    0%,100% { text-shadow: 0 0 20px var(--green); }
    50%      { text-shadow: 0 0 50px var(--green), 0 0 90px #00ff4188; }
  }
  #win-flag {
    font-size: clamp(14px, 2.5vw, 20px);
    color: var(--pink);
    letter-spacing: 2px;
  }
  #win-sub {
    font-size: 13px; color: var(--dimgreen);
    letter-spacing: 2px;
  }
  #restart-btn {
    margin-top: 10px;
    padding: 10px 28px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  #restart-btn:hover {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 20px var(--green);
  }

  /* ── glitch on title ── */
  .glitch {
    position: relative;
  }
  .glitch::before, .glitch::after {
    content: attr(data-text);
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
  }
  .glitch::before {
    color: #ff3c3c; clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    animation: glitch1 3s infinite; opacity: 0.7;
  }
  .glitch::after {
    color: var(--cyan); clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    animation: glitch2 3s infinite; opacity: 0.7;
  }
  @keyframes glitch1 { 0%,90%,100%{transform:translate(0)} 92%{transform:translate(-3px,1px)} 96%{transform:translate(3px,-1px)} }
  @keyframes glitch2 { 0%,90%,100%{transform:translate(0)} 93%{transform:translate(3px,1px)} 97%{transform:translate(-3px,-1px)} }
</style>
</head>
<body>

<div id="app">
  <!-- Title bar -->
  <div id="titlebar">
    <div class="dots">
      <span class="dot-r"></span><span class="dot-y"></span><span class="dot-g"></span>
    </div>
    <div class="title">TRYHACKME // TERMINAL SIM <span id="blink">█</span></div>
    <div class="status" id="status-txt">CONNECTED</div>
  </div>

  <!-- Round banner -->
  <div id="round-banner">⚔ ROUND 2 &nbsp;—&nbsp; INFILTRATE THE SERVER &nbsp;—&nbsp; TARGET: 10.10.10.5</div>

  <!-- Objectives -->
  <div id="objectives">
    <span class="obj" id="obj-ping"><span class="check">○</span> Ping the target</span>
    <span class="obj" id="obj-nmap"><span class="check">○</span> Scan open ports (nmap)</span>
    <span class="obj" id="obj-ls">  <span class="check">○</span> List files (ls)</span>
    <span class="obj" id="obj-flag"><span class="check">○</span> Capture the flag</span>
  </div>

  <!-- Output -->
  <div id="output"></div>

  <!-- Input -->
  <div id="input-row">
    <span id="prompt-label">player@thm:~$</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command...">
  </div>
</div>

<!-- Win overlay -->
<div id="win-overlay">
  <div id="win-title" class="glitch" data-text="ROUND COMPLETE">ROUND COMPLETE</div>
  <div id="win-flag"></div>
  <div id="win-sub">ALL OBJECTIVES ACHIEVED — ACCESS GRANTED</div>
  <button id="restart-btn" onclick="restartGame()">[ RESTART ]</button>
</div>

<script>
// ── state ─────────────────────────────────────────────────────────────────
const objectives = { ping: false, nmap: false, ls: false, flag: false };
let busy = false;
let history = [], histIdx = -1;

const FLAG = "flag{y0u_pwn3d_r0und_2}";

// ── filesystem ────────────────────────────────────────────────────────────
const FS = {
  "/home/player": ["notes.txt", "flag.txt", "creds.bak"],
  "/etc":         ["passwd", "hosts", "shadow"],
  "/var/log":     ["auth.log", "syslog"],
};
const FILES = {
  "/home/player/notes.txt":  "Scan 10.10.10.5 first. Something's running on a non-standard port.",
  "/home/player/creds.bak":  "# Old creds — DO NOT COMMIT\nuser: admin\npass: Tr0ub4dor&3",
  "/home/player/flag.txt":   FLAG,
  "/etc/passwd":             "root:x:0:0:root:/root:/bin/bash\nplayer:x:1000:1000::/home/player:/bin/bash",
  "/etc/hosts":              "127.0.0.1\tlocalhost\n10.10.10.5\ttarget.thm",
  "/etc/shadow":             "Permission denied.",
  "/var/log/auth.log":       "Mar 07 02:14:22 sshd[1337]: Failed password for root from 10.10.10.99\nMar 07 02:14:55 sshd[1337]: Accepted password for player from 10.10.10.1",
  "/var/log/syslog":         "kernel: iptables DROP SRC=10.10.10.99 DST=10.10.10.5 DPT=22",
};

let cwd = "/home/player";

function resolvePath(p) {
  if (!p || p === "~") return "/home/player";
  if (p.startsWith("/")) return p.replace(/\/$/, "") || "/";
  if (p === "..") return cwd.split("/").slice(0, -1).join("/") || "/";
  return (cwd + "/" + p).replace(/\/+/g, "/");
}

// ── DOM helpers ───────────────────────────────────────────────────────────
const output   = document.getElementById("output");
const cmdInput = document.getElementById("cmd-input");
const promptEl = document.getElementById("prompt-label");

function print(html, cls = "") {
  const s = document.createElement("span");
  s.className = "line " + cls;
  s.innerHTML = html;
  output.appendChild(s);
  output.scrollTop = output.scrollHeight;
}
function blank() { print("&nbsp;"); }

function updatePrompt() {
  promptEl.textContent = `player@thm:${cwd}$`;
}

function completeObj(key) {
  if (objectives[key]) return;
  objectives[key] = true;
  const el = document.getElementById("obj-" + key);
  if (el) {
    el.classList.add("done");
    el.querySelector(".check").textContent = "✓";
  }
}

function checkWin() {
  if (Object.values(objectives).every(Boolean)) {
    setTimeout(() => {
      document.getElementById("win-flag").textContent = FLAG;
      document.getElementById("win-overlay").classList.add("show");
    }, 1200);
  }
}

// ── typing effect ─────────────────────────────────────────────────────────
function typeLines(lines, delay = 38) {
  return new Promise(resolve => {
    let i = 0;
    function next() {
      if (i >= lines.length) { resolve(); return; }
      print(lines[i++]);
      output.scrollTop = output.scrollHeight;
      setTimeout(next, delay);
    }
    next();
  });
}

// ── boot sequence ─────────────────────────────────────────────────────────
async function boot() {
  busy = true;
  cmdInput.disabled = true;
  await typeLines([
    `<span class="c-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`,
    `<span class="c-yellow c-bold">  ⚔  ROUND 1 COMPLETE — ALL ENEMIES DEFEATED  ⚔</span>`,
    `<span class="c-dim">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</span>`,
  ], 60);
  await sleep(600);
  await typeLines([
    `<span class="c-green">A terminal flickers on in the corner of the room...</span>`,
    `<span class="c-dim">Initialising secure shell...</span>`,
    `<span class="c-dim">Loading TryHackMe environment...</span>`,
  ], 80);
  await sleep(500);
  await typeLines([
    `<span class="c-cyan">Connected to 10.10.10.5 (target.thm)</span>`,
    `<span class="c-green">Welcome, player. Last login: Mon Mar  6 23:11:04 2026</span>`,
    `&nbsp;`,
    `<span class="c-yellow">MISSION:</span> <span class="c-white">Capture the flag hidden on the target server.</span>`,
    `<span class="c-dim">Type <span class="c-cyan">help</span> to see available commands.</span>`,
    `&nbsp;`,
  ], 55);
  cmdInput.disabled = false;
  cmdInput.focus();
  busy = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── command handler ───────────────────────────────────────────────────────
cmdInput.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") {
    histIdx = Math.min(histIdx + 1, history.length - 1);
    cmdInput.value = history[histIdx] || "";
    e.preventDefault();
  } else if (e.key === "ArrowDown") {
    histIdx = Math.max(histIdx - 1, -1);
    cmdInput.value = histIdx === -1 ? "" : history[histIdx];
    e.preventDefault();
  }
});

cmdInput.addEventListener("keypress", async e => {
  if (e.key !== "Enter" || busy) return;
  const raw = cmdInput.value.trim();
  cmdInput.value = "";
  if (!raw) return;
  history.unshift(raw);
  histIdx = -1;
  print(`<span class="c-green">player@thm</span>:<span class="c-cyan">${cwd}</span>$ ${escHtml(raw)}`, "prompt-line");
  busy = true;
  await runCommand(raw);
  busy = false;
  output.scrollTop = output.scrollHeight;
});

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── commands ──────────────────────────────────────────────────────────────
async function runCommand(raw) {
  const parts = raw.trim().split(/\s+/);
  const cmd   = parts[0].toLowerCase();
  const args  = parts.slice(1);

  switch(cmd) {
    case "help":    cmdHelp(); break;
    case "clear":   output.innerHTML = ""; break;
    case "pwd":     print(cwd); break;
    case "whoami":  print("player"); break;
    case "id":      print(`<span class="c-green">uid=1000(player) gid=1000(player) groups=1000(player),27(sudo)</span>`); break;
    case "uname":   print("Linux thm-box 5.15.0-kali3 #1 SMP PREEMPT x86_64 GNU/Linux"); break;
    case "date":    print(new Date().toString()); break;
    case "echo":    print(escHtml(args.join(" "))); break;
    case "ls":      cmdLs(args); break;
    case "cd":      cmdCd(args); break;
    case "cat":     cmdCat(args); break;
    case "ping":    await cmdPing(args); break;
    case "nmap":    await cmdNmap(args); break;
    case "ssh":     await cmdSsh(args); break;
    case "curl":    await cmdCurl(args); break;
    case "history": history.slice(0,20).forEach((h,i) => print(`  ${String(i+1).padStart(3)}  ${escHtml(h)}`)); break;
    case "sudo":    print(`<span class="c-red">[sudo] password for player: </span>`);
                    await sleep(800); print(`<span class="c-red">Sorry, try again.</span>`); break;
    case "exit":    print(`<span class="c-dim">logout — Connection to target.thm closed.</span>`); cmdInput.disabled = true; break;
    default:
      print(`<span class="c-red">bash: ${escHtml(cmd)}: command not found</span>`);
  }
}

function cmdHelp() {
  print(`<span class="c-yellow">━━ Available Commands ━━━━━━━━━━━━━━━━━━━━━━━</span>`);
  const cmds = [
    ["ping &lt;host&gt;",   "check if host is reachable"],
    ["nmap &lt;target&gt;", "scan open ports on target"],
    ["ls [dir]",        "list directory contents"],
    ["cd &lt;dir&gt;",     "change directory"],
    ["cat &lt;file&gt;",   "read a file"],
    ["pwd",             "print working directory"],
    ["whoami / id",     "show current user"],
    ["ssh user@host",   "connect via SSH"],
    ["curl &lt;url&gt;",   "fetch a URL"],
    ["echo &lt;text&gt;",  "print text"],
    ["history",         "command history"],
    ["clear",           "clear screen"],
    ["exit",            "close terminal"],
  ];
  cmds.forEach(([c, d]) =>
    print(`  <span class="c-cyan">${c.padEnd(22)}</span><span class="c-dim">${d}</span>`)
  );
  blank();
}

function cmdLs(args) {
  const path = args.length ? resolvePath(args[args.length-1]) : cwd;
  if (FS[path]) {
    FS[path].forEach(f => {
      const full = path + "/" + f;
      const isDir = FS[full] !== undefined;
      const color = isDir ? "c-cyan" : (f.endsWith(".txt") ? "c-green" : "c-white");
      print(`<span class="${color}">${f}${isDir ? "/" : ""}</span>`);
    });
    completeObj("ls");
  } else {
    print(`<span class="c-red">ls: cannot access '${escHtml(args[0] || cwd)}': No such file or directory</span>`);
  }
}

function cmdCd(args) {
  const target = resolvePath(args[0]);
  if (!args[0] || args[0] === "~") { cwd = "/home/player"; updatePrompt(); return; }
  if (FS[target] !== undefined) {
    cwd = target; updatePrompt();
  } else {
    print(`<span class="c-red">bash: cd: ${escHtml(args[0])}: No such file or directory</span>`);
  }
}

function cmdCat(args) {
  if (!args.length) { print(`<span class="c-red">cat: missing operand</span>`); return; }
  const path = resolvePath(args[0]);
  if (FILES[path] !== undefined) {
    const content = FILES[path];
    if (path.endsWith("flag.txt")) {
      if (!objectives.nmap) {
        print(`<span class="c-red">cat: flag.txt: Permission denied — scan the target first.</span>`);
        return;
      }
      print(`<span class="c-pink c-bold">${escHtml(content)}</span>`);
      blank();
      print(`<span class="c-yellow">🏁 FLAG CAPTURED!</span>`);
      completeObj("flag");
      checkWin();
    } else {
      content.split("\n").forEach(l => print(escHtml(l)));
    }
  } else if (FS[path]) {
    print(`<span class="c-red">cat: ${escHtml(args[0])}: Is a directory</span>`);
  } else {
    print(`<span class="c-red">cat: ${escHtml(args[0])}: No such file or directory</span>`);
  }
}

async function cmdPing(args) {
  if (!args.length) { print(`<span class="c-red">Usage: ping &lt;host&gt;</span>`); return; }
  const host = args[0];
  print(`<span class="c-white">PING ${escHtml(host)} 56(84) bytes of data.</span>`);
  for (let i = 1; i <= 4; i++) {
    await sleep(500);
    const ms = (Math.random() * 35 + 8).toFixed(3);
    print(`64 bytes from <span class="c-green">${escHtml(host)}</span>: icmp_seq=${i} ttl=64 time=<span class="c-yellow">${ms} ms</span>`);
  }
  await sleep(200);
  print(`<span class="c-dim">--- ${escHtml(host)} ping statistics ---</span>`);
  print(`<span class="c-green">4 packets transmitted, 4 received, 0% packet loss</span>`);
  blank();
  completeObj("ping");
}

async function cmdNmap(args) {
  if (!args.length) { print(`<span class="c-red">Usage: nmap &lt;target&gt;</span>`); return; }
  const target = args[args.length - 1];
  print(`<span class="c-yellow">Starting Nmap 7.94 ( https://nmap.org )</span>`);
  print(`<span class="c-dim">Nmap scan report for ${escHtml(target)}</span>`);
  await sleep(600);
  print(`<span class="c-dim">Host is up (0.021s latency).</span>`);
  await sleep(1800);
  const ports = [
    ["22",   "tcp", "open", "ssh",        "OpenSSH 8.9p1"],
    ["80",   "tcp", "open", "http",       "Apache httpd 2.4.54"],
    ["8080", "tcp", "open", "http-proxy", "Werkzeug/2.3.0 Python/3.11"],
    ["3306", "tcp", "open", "mysql",      "MySQL 8.0.33"],
    ["6379", "tcp", "open", "redis",      "Redis 7.0.5"],
  ];
  print(`<span class="c-white">PORT      STATE  SERVICE      VERSION</span>`);
  for (const [port, proto, state, svc, ver] of ports) {
    await sleep(180);
    print(`<span class="c-cyan">${(port+"/"+proto).padEnd(10)}</span><span class="c-green">open   </span>${svc.padEnd(13)}<span class="c-dim">${ver}</span>`);
  }
  blank();
  print(`<span class="c-green">Nmap done: 1 IP address (1 host up) scanned in 4.12 seconds</span>`);
  blank();
  completeObj("nmap");
  print(`<span class="c-yellow">Hint: something interesting might be in your home directory.</span>`);
  blank();
}

async function cmdSsh(args) {
  if (!args.length) { print(`<span class="c-red">Usage: ssh user@host</span>`); return; }
  print(`<span class="c-dim">Connecting to ${escHtml(args[0])}...</span>`);
  await sleep(1200);
  print(`<span class="c-red">ssh: connect to host: Connection refused</span>`);
  print(`<span class="c-dim">(Use in-game credentials to proceed past this point.)</span>`);
}

async function cmdCurl(args) {
  if (!args.length) { print(`<span class="c-red">Usage: curl &lt;url&gt;</span>`); return; }
  print(`<span class="c-dim">curl: (7) Failed to connect — no external network in sandbox.</span>`);
}

// ── restart ───────────────────────────────────────────────────────────────
function restartGame() {
  document.getElementById("win-overlay").classList.remove("show");
  output.innerHTML = "";
  Object.keys(objectives).forEach(k => objectives[k] = false);
  document.querySelectorAll(".obj").forEach(el => {
    el.classList.remove("done");
    el.querySelector(".check").textContent = "○";
  });
  cwd = "/home/player";
  updatePrompt();
  history = []; histIdx = -1;
  cmdInput.disabled = false;
  boot();
}

// ── start ─────────────────────────────────────────────────────────────────
boot();
cmdInput.focus();
document.body.addEventListener("click", () => cmdInput.focus());
</script>
</body>
