name: Capstone CI

# NOTE: GitHub Actions only discovers workflows under a repo-root .github/workflows
# directory. This file lives here (inside Week-7-Capstone/21-Capstone-Deployment-CICD)
# to keep every capstone artifact under the Week-7-Capstone tree; to activate it in a
# real repository, copy it to <repo-root>/.github/workflows/capstone-ci.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend - Maven build & test (JDK 17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        run: mvn -B -f Week-7-Capstone/19-Capstone-Bookstore-Backend test

  frontend-build:
    name: Frontend - npm ci & build (Node 18)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: Week-7-Capstone/20-Capstone-Bookstore-Frontend-React/bookstore-frontend/package-lock.json

      - name: Install dependencies
        working-directory: Week-7-Capstone/20-Capstone-Bookstore-Frontend-React/bookstore-frontend
        run: npm ci

      - name: Build frontend
        working-directory: Week-7-Capstone/20-Capstone-Bookstore-Frontend-React/bookstore-frontend
        run: npm run build

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: Week-7-Capstone/19-Capstone-Bookstore-Backend
          file: Week-7-Capstone/19-Capstone-Bookstore-Backend/Dockerfile
          push: false
          tags: bookstore-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: Week-7-Capstone/20-Capstone-Bookstore-Frontend-React/bookstore-frontend
          file: Week-7-Capstone/20-Capstone-Bookstore-Frontend-React/bookstore-frontend/Dockerfile
          push: false
          build-args: |
            VITE_API_BASE_URL=http://localhost:8080/api/v1
          tags: bookstore-frontend:ci
