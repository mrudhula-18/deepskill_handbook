server {
    listen       80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Single Page Application fallback routing: any unmatched path falls back
    # to index.html so react-router-dom's client-side routes resolve correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
